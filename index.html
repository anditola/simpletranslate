<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Translate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; overflow: hidden; height: 100vh; height: 100dvh; }
  .half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s, filter 0.15s; padding: 24px; user-select: none; -webkit-user-select: none; position: relative; touch-action: manipulation; min-height: 0; }
  .half.de { background: #1e1c1a; color: #fff; }
  .half.it { background: #f4f1ec; color: #111; }
  @media (hover: hover) { .half:hover { filter: brightness(1.08); } }
  .half.recording { animation: pulse 1.1s ease-in-out infinite; }
  .half.de.recording { background: #5a1a1a; }
  .half.it.recording { background: #ffd9c9; }
  .half.processing { opacity: 0.7; }
  @keyframes pulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }
  .label-row { display: flex; align-items: center; gap: 20px; }
  .label { font-size: clamp(40px, 7vw, 72px); font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .status { font-size: 14px; opacity: 0.6; margin-top: 6px; min-height: 20px; display: inline-flex; align-items: center; gap: 8px; }
  .result { margin-top: 28px; max-width: 720px; text-align: center; width: 100%; }
  .result .source { opacity: 0.5; font-size: 15px; margin-bottom: 10px; font-style: italic; }
  .result .translated { font-size: clamp(20px, 2.4vw, 28px); line-height: 1.35; font-weight: 500; }

  /* typing dots */
  .dots { display: none; gap: 4px; align-items: center; }
  .half.processing .dots { display: inline-flex; }
  .dots i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.35; animation: dot-bounce 1.2s ease-in-out infinite; }
  .dots i:nth-child(2) { animation-delay: 0.15s; }
  .dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40%           { opacity: 1;   transform: translateY(-4px); }
  }

  /* shimmer skeleton for the target side while waiting for translation */
  .skeleton { display: flex; flex-direction: column; gap: 12px; align-items: center; margin: 0 auto; max-width: 560px; }
  .skeleton .line { height: 22px; width: 100%; border-radius: 6px;
    background: linear-gradient(90deg, rgba(127,127,127,0.10) 0%, rgba(127,127,127,0.28) 50%, rgba(127,127,127,0.10) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton .line.short { width: 60%; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* live audio meter sits next to the language label; dim when idle, full when recording/playing */
  .meter { display: flex; align-items: flex-end; gap: 5px; height: 52px; opacity: 0.18; transition: opacity 0.2s; }
  .half.recording .meter, .half.playing .meter { opacity: 1; }
  .meter i { display: block; width: 6px; height: 8%; background: currentColor; border-radius: 3px; transition: height 60ms linear; }

  /* action buttons (replay/copy) next to source / translated text */
  .result .source, .result .translated { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .icon-btn { background: none; border: 1.5px solid currentColor; border-radius: 999px; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: inherit; opacity: 0.55; transition: opacity 0.15s, transform 0.1s; padding: 0; flex-shrink: 0; }
  @media (hover: hover) { .icon-btn:hover { opacity: 1; } }
  .icon-btn:active { transform: scale(0.92); opacity: 1; }
  .icon-btn svg { width: 22px; height: 22px; }
  .icon-btn.copied { opacity: 1; }

  /* top-right toolbar (history + key) — always on the dark half, so explicit white */
  .topbar { position: fixed; top: 10px; right: 12px; display: flex; gap: 6px; z-index: 15; }
  .topbar button { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; opacity: 0.85; cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; width: 38px; height: 38px; border-radius: 999px; transition: opacity 0.15s, background 0.15s; }
  .topbar button:hover { opacity: 1; background: rgba(255,255,255,0.22); }
  .topbar button svg { width: 20px; height: 20px; }

  /* history overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 30; padding: 16px; }
  .overlay.hidden { display: none; }
  .overlay-card { background: #1c1c1c; color: #fff; border-radius: 14px; width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .overlay-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #2c2c2c; }
  .overlay-head h2 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 0.3px; }
  .overlay-close { background: none; border: none; color: #fff; font-size: 26px; cursor: pointer; line-height: 1; padding: 0 6px; opacity: 0.6; }
  .overlay-close:hover { opacity: 1; }
  .overlay-body { overflow-y: auto; padding: 4px 18px 14px; }
  .history-item { padding: 14px 0; border-bottom: 1px solid #2a2a2a; }
  .history-item:last-child { border-bottom: none; }
  .history-item .dir { font-size: 11px; opacity: 0.5; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
  .history-item .src { opacity: 0.6; font-style: italic; margin-bottom: 4px; font-size: 14px; line-height: 1.35; }
  .history-item .trans { font-size: 17px; margin-bottom: 10px; line-height: 1.35; }
  .history-item .actions { display: flex; gap: 8px; align-items: center; }
  .history-item .icon-btn { width: 34px; height: 34px; border-width: 1px; }
  .history-item .icon-btn svg { width: 16px; height: 16px; }
  .history-empty { padding: 28px 12px; text-align: center; opacity: 0.5; font-size: 14px; }

  /* mobile / narrow screens */
  @media (max-width: 560px) {
    .half { padding: 16px; }
    .label { font-size: clamp(34px, 11vw, 56px); letter-spacing: -1.5px; }
    .label-row { gap: 14px; }
    .meter { height: 40px; gap: 4px; }
    .meter i { width: 5px; }
    .status { font-size: 13px; margin-top: 4px; }
    .result { margin-top: 18px; }
    .result .source { font-size: 14px; margin-bottom: 6px; }
    .topbar { top: 6px; right: 8px; gap: 4px; }
    .topbar button { width: 34px; height: 34px; }
    .topbar button svg { width: 18px; height: 18px; }
  }

  /* very short viewports — e.g. landscape phone */
  @media (max-height: 480px) {
    .half { padding: 10px 16px; }
    .label { font-size: clamp(28px, 7vh, 44px); }
    .meter { height: 36px; }
    .result { margin-top: 10px; }
  }
  /* form styles used inside the key overlay */
  .overlay-info { font-size: 13px; opacity: 0.65; margin: 4px 0 14px; line-height: 1.45; }
  .overlay-body input[type="password"] { width: 100%; padding: 11px 13px; background: #2a2724; color: #fff; border: 1px solid #3a3733; border-radius: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; box-sizing: border-box; }
  .overlay-body input[type="password"]:focus { outline: none; border-color: #4ab38a; }
  .overlay-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .overlay-actions .primary { background: #2a7; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .overlay-actions .primary:hover { background: #38a577; }
</style>
</head>
<body>

<div id="keyOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>OpenAI API Key</h2>
      <button class="overlay-close" id="keyClose" aria-label="Schließen">×</button>
    </div>
    <div class="overlay-body">
      <p class="overlay-info">Wird nur in deinem Browser gespeichert (localStorage) und direkt an OpenAI gesendet — landet nie auf einem Server.</p>
      <input type="password" id="keyInput" placeholder="sk-...">
      <div class="overlay-actions">
        <button id="keySave" class="primary">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div class="half de" data-lang="de" data-target="it">
  <div class="label-row">
    <div class="label">Deutsch</div>
    <div class="meter"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="status"><span class="status-text">Klick zum Sprechen</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div class="result" id="result-de"></div>
</div>

<div class="half it" data-lang="it" data-target="de">
  <div class="label-row">
    <div class="label">Italiano</div>
    <div class="meter"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="status"><span class="status-text">Clicca per parlare</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div class="result" id="result-it"></div>
</div>

<div class="topbar">
  <button id="historyBtn" title="Verlauf" aria-label="Verlauf"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm-1 5v5l4 2 .7-1.3-3.2-1.9V8H12z"/><path d="M13 3v2c.7 0 1.4.1 2 .2L15.5 3.4A9 9 0 0 0 13 3z" opacity=".5"/></svg></button>
  <button id="gear" title="API Key" aria-label="API Key"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.58-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.5.5 0 0 0 13.93 2h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.58.22L2.74 8.48a.5.5 0 0 0 .12.61l2.03 1.58c-.04.31-.07.63-.07.94 0 .31.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.31.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.06.24.27.42.49.42h3.84c.24 0 .44-.18.49-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.49 0 .61-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
</div>

<div id="historyOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>Verlauf</h2>
      <button class="overlay-close" id="historyClose" aria-label="Schließen">×</button>
    </div>
    <div class="overlay-body" id="historyList"></div>
  </div>
</div>

<script>
const SVG = {
  speaker: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.91 7-4.49 7-8.77s-3-7.86-7-8.77z"/></svg>',
  mic: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.58-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.5.5 0 0 0 13.93 2h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.58.22L2.74 8.48a.5.5 0 0 0 .12.61l2.03 1.58c-.04.31-.07.63-.07.94 0 .31.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.31.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.06.24.27.42.49.42h3.84c.24 0 .44-.18.49-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.49 0 .61-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>'
};

const LANG_NAMES = { de: 'German', it: 'Italian' };
const STATUS = {
  de: { idle: 'Klick zum Sprechen', recording: '● Aufnahme läuft — Klick zum Stoppen', transcribing: 'Höre zu', translating: 'Übersetze' },
  it: { idle: 'Clicca per parlare',  recording: '● Registrazione — clicca per fermare', transcribing: 'Ascolto',   translating: 'Traduco' }
};

let apiKey = localStorage.getItem('openai_key') || '';
let mediaRecorder = null;
let audioChunks = [];
let recordingLang = null;
let busy = false;
let micStream = null;
let audioCtx = null, analyser = null, meterSource = null, meterStream = null, meterRaf = null;
let lastSourceBlob = null, lastTtsBlob = null;
let activePlayback = null;
const history = []; // newest at end, max 5

const keyOverlay = document.getElementById('keyOverlay');
const keyInput = document.getElementById('keyInput');
function openKey() { keyInput.value = apiKey; keyOverlay.classList.remove('hidden'); setTimeout(() => keyInput.focus(), 0); }
function closeKey() { keyOverlay.classList.add('hidden'); }
document.getElementById('gear').onclick = openKey;
document.getElementById('keyClose').onclick = closeKey;
document.getElementById('keySave').onclick = saveKey;
keyOverlay.addEventListener('click', e => { if (e.target === keyOverlay) closeKey(); });
keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
function saveKey() {
  apiKey = keyInput.value.trim();
  localStorage.setItem('openai_key', apiKey);
  closeKey();
}
if (!apiKey) openKey();

document.querySelectorAll('.half').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target.closest('.overlay') || e.target.closest('.topbar') || e.target.closest('.icon-btn')) return;
    const lang = el.dataset.lang;
    const target = el.dataset.target;
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      if (recordingLang === lang) stopRecording();
      return;
    }
    if (busy) return;
    startRecording(lang, target);
  });
});

// Main UI replay buttons (data-replay="source"|"tts")
document.addEventListener('click', e => {
  const btn = e.target.closest('.replay');
  if (!btn || btn.closest('#historyOverlay')) return;
  e.stopPropagation();
  const blob = btn.dataset.replay === 'source' ? lastSourceBlob : lastTtsBlob;
  if (!blob) return;
  const lang = btn.closest('.half').dataset.lang;
  playAudioWithMeter(blob, lang);
});

// Main UI copy button (next to translation)
document.addEventListener('click', e => {
  const btn = e.target.closest('.copy');
  if (!btn || btn.closest('#historyOverlay')) return;
  e.stopPropagation();
  const transEl = btn.closest('.translated');
  if (!transEl) return;
  copyToClipboard(btn, transEl.querySelector('span').textContent);
});

// History overlay actions (replay-src / replay-tts / copy)
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-h-action]');
  if (!btn) return;
  e.stopPropagation();
  const idx = parseInt(btn.dataset.hIdx, 10);
  const h = history[idx];
  if (!h) return;
  const action = btn.dataset.hAction;
  if      (action === 'src'  && h.sourceBlob) playAudioWithMeter(h.sourceBlob, h.sourceLang);
  else if (action === 'tts'  && h.ttsBlob)    playAudioWithMeter(h.ttsBlob,    h.targetLang);
  else if (action === 'copy')                 copyToClipboard(btn, h.translatedText);
});

async function ensureMicStream() {
  if (micStream && micStream.active && micStream.getAudioTracks().some(t => t.readyState === 'live')) {
    return micStream;
  }
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return micStream;
}

function startMeter(stream, lang) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (meterStream !== stream) {
    if (meterSource) { try { meterSource.disconnect(); } catch (e) {} }
    meterSource = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    analyser.smoothingTimeConstant = 0.6;
    meterSource.connect(analyser);
    meterStream = stream;
  }
  const data = new Uint8Array(analyser.frequencyBinCount);
  const bars = document.querySelectorAll(`.half[data-lang="${lang}"] .meter i`);
  const N = bars.length;
  const binSize = Math.max(1, Math.floor(data.length / N));
  function tick() {
    analyser.getByteFrequencyData(data);
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let j = 0; j < binSize; j++) sum += data[i * binSize + j] || 0;
      const avg = sum / binSize;
      const pct = Math.min(100, 8 + (avg / 255) * 130);
      bars[i].style.height = pct + '%';
    }
    meterRaf = requestAnimationFrame(tick);
  }
  tick();
}

function stopMeter(lang) {
  if (meterRaf) cancelAnimationFrame(meterRaf);
  meterRaf = null;
  const sel = lang ? `.half[data-lang="${lang}"] .meter i` : '.meter i';
  document.querySelectorAll(sel).forEach(b => b.style.height = '8%');
}

async function playAudioWithMeter(blob, lang) {
  stopPlayback();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // Fully decode before playback so we don't clip the first samples
  // (which happens with MediaElementAudioSource + AnalyserNode while the
  // <audio> element is still buffering).
  let audioBuffer;
  try {
    const arrayBuf = await blob.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
  } catch (err) {
    console.error('Decode failed:', err);
    return;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  const an = audioCtx.createAnalyser();
  an.fftSize = 64;
  an.smoothingTimeConstant = 0.6;
  source.connect(an);
  an.connect(audioCtx.destination);

  const half = document.querySelector(`.half[data-lang="${lang}"]`);
  half.classList.add('playing');
  const bars = half.querySelectorAll('.meter i');
  const N = bars.length;
  const data = new Uint8Array(an.frequencyBinCount);
  const binSize = Math.max(1, Math.floor(data.length / N));
  let raf;
  function tick() {
    an.getByteFrequencyData(data);
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let j = 0; j < binSize; j++) sum += data[i * binSize + j] || 0;
      const avg = sum / binSize;
      bars[i].style.height = Math.min(100, 8 + (avg / 255) * 130) + '%';
    }
    raf = requestAnimationFrame(tick);
  }

  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    if (raf) cancelAnimationFrame(raf);
    half.classList.remove('playing');
    bars.forEach(b => b.style.height = '8%');
    try { source.disconnect(); an.disconnect(); } catch (e) {}
    if (activePlayback && activePlayback.source === source) activePlayback = null;
  };
  source.onended = cleanup;

  activePlayback = { source, cleanup };
  source.start(0);
  tick();
}

function stopPlayback() {
  if (activePlayback) {
    try { activePlayback.source.stop(); } catch (e) {}
    activePlayback.cleanup && activePlayback.cleanup();
    activePlayback = null;
  }
}

async function startRecording(lang, target) {
  if (!apiKey) { openKey(); return; }
  try {
    stopPlayback();
    clearResult(lang);
    clearResult(target);
    const stream = await ensureMicStream();
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recordingLang = lang;
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      processAudio(blob, lang, target);
    };
    mediaRecorder.start();
    setStatus(lang, 'recording');
    document.querySelector(`.half[data-lang="${lang}"]`).classList.add('recording');
    startMeter(stream, lang);
  } catch (err) {
    micStream = null;
    alert('Mikrofon-Zugriff verweigert: ' + err.message);
    setStatus(lang, 'idle');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    const lang = recordingLang;
    const half = document.querySelector(`.half[data-lang="${lang}"]`);
    const target = half.dataset.target;
    mediaRecorder.stop();
    stopMeter(lang);
    half.classList.remove('recording');
    half.classList.add('processing');
    setStatus(lang, 'transcribing');
    showSkeleton(target);
  }
}

function setStatus(lang, key) {
  document.querySelector(`.half[data-lang="${lang}"] .status-text`).textContent = STATUS[lang][key];
}

function showSkeleton(lang) {
  document.getElementById('result-' + lang).innerHTML =
    '<div class="skeleton"><div class="line"></div><div class="line short"></div></div>';
}

function clearResult(lang) {
  document.getElementById('result-' + lang).innerHTML = '';
}

async function processAudio(blob, sourceLang, targetLang) {
  busy = true;
  lastSourceBlob = blob;
  try {
    // 1. STT
    const fd = new FormData();
    const ext = (blob.type.includes('mp4') || blob.type.includes('mp4a')) ? 'mp4' : 'webm';
    fd.append('file', blob, 'audio.' + ext);
    fd.append('model', 'gpt-4o-mini-transcribe');
    fd.append('language', sourceLang);
    const tRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey },
      body: fd
    });
    if (!tRes.ok) throw new Error('STT: ' + await tRes.text());
    const { text: sourceText } = await tRes.json();
    if (!sourceText || !sourceText.trim()) throw new Error('Keine Sprache erkannt');

    // Progressive reveal: show transcribed source immediately, flip status to "translating"
    document.getElementById('result-' + sourceLang).innerHTML =
      `<div class="source"><span>${esc(sourceText)}</span>${replayBtn('source')}</div>`;
    setStatus(sourceLang, 'translating');

    // 2. GPT translation
    const trRes = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        temperature: 0.2,
        messages: [
          { role: 'system', content: `You translate from ${LANG_NAMES[sourceLang]} to ${LANG_NAMES[targetLang]}. Output ONLY the translation. No quotes, no explanation, no source text.` },
          { role: 'user', content: sourceText }
        ]
      })
    });
    if (!trRes.ok) throw new Error('GPT: ' + await trRes.text());
    const trJson = await trRes.json();
    const translatedText = trJson.choices[0].message.content.trim().replace(/^["']|["']$/g, '');

    document.getElementById('result-' + targetLang).innerHTML =
      `<div class="translated"><span>${esc(translatedText)}</span>${replayBtn('tts')}${copyBtn()}</div>`;
    setStatus(sourceLang, 'idle');
    document.querySelector(`.half[data-lang="${sourceLang}"]`).classList.remove('processing');
    busy = false;

    // 3. TTS — fire-and-forget so user can already start the next recording
    const ttsPromise = speak(translatedText, targetLang);
    // 4. Once TTS arrives, save into history
    ttsPromise.then(ttsBlob => {
      if (ttsBlob) recordHistory({
        sourceLang, targetLang, sourceText, translatedText,
        sourceBlob: blob, ttsBlob
      });
    });
  } catch (err) {
    console.error(err);
    alert('Fehler: ' + err.message);
    setStatus(sourceLang, 'idle');
    document.querySelector(`.half[data-lang="${sourceLang}"]`).classList.remove('processing');
    clearResult(targetLang);
    busy = false;
  }
}

async function speak(text, lang) {
  try {
    const ttsRes = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'tts-1', voice: 'nova', input: text, response_format: 'mp3' })
    });
    if (!ttsRes.ok) throw new Error('TTS: ' + await ttsRes.text());
    const audioBlob = await ttsRes.blob();
    lastTtsBlob = audioBlob;
    playAudioWithMeter(audioBlob, lang);
    return audioBlob;
  } catch (err) {
    console.error(err);
    return null;
  }
}

function replayBtn(which) {
  return `<button class="icon-btn replay" data-replay="${which}" title="Nochmal anhören" aria-label="Nochmal anhören">${SVG.speaker}</button>`;
}

function copyBtn() {
  return `<button class="icon-btn copy" title="In die Zwischenablage" aria-label="In die Zwischenablage">${SVG.copy}</button>`;
}

async function copyToClipboard(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    // Fallback for non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
  const original = btn.innerHTML;
  btn.innerHTML = SVG.check;
  btn.classList.add('copied');
  setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1100);
}

function recordHistory(entry) {
  history.push(entry);
  if (history.length > 5) history.shift();
}

const historyOverlay = document.getElementById('historyOverlay');
function openHistory() { renderHistory(); historyOverlay.classList.remove('hidden'); }
function closeHistory() { historyOverlay.classList.add('hidden'); }
document.getElementById('historyBtn').onclick = openHistory;
document.getElementById('historyClose').onclick = closeHistory;
historyOverlay.addEventListener('click', e => { if (e.target === historyOverlay) closeHistory(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!historyOverlay.classList.contains('hidden')) closeHistory();
  if (!keyOverlay.classList.contains('hidden')) closeKey();
});

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">Noch nichts übersetzt.</div>';
    return;
  }
  // newest first
  list.innerHTML = history.slice().reverse().map((h, i) => {
    const idx = history.length - 1 - i;
    return `<div class="history-item" data-idx="${idx}">
      <div class="dir">${h.sourceLang.toUpperCase()} → ${h.targetLang.toUpperCase()}</div>
      <div class="src">${esc(h.sourceText)}</div>
      <div class="trans">${esc(h.translatedText)}</div>
      <div class="actions">
        <button class="icon-btn" data-h-action="src" data-h-idx="${idx}" title="Aufnahme anhören">${SVG.mic}</button>
        <button class="icon-btn" data-h-action="tts" data-h-idx="${idx}" title="Übersetzung anhören">${SVG.speaker}</button>
        <button class="icon-btn copy" data-h-action="copy" data-h-idx="${idx}" title="Übersetzung kopieren">${SVG.copy}</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
