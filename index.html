<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Translate</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2a2f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Translate">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; overflow: hidden; height: 100vh; height: 100dvh; }
  .half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s, filter 0.15s; padding: 24px; user-select: none; -webkit-user-select: none; position: relative; touch-action: manipulation; min-height: 0; }
  .half.de { background: #1a2a2f; color: #fff; }
  .half.it { background: #f4f1ec; color: #111; }
  @media (hover: hover) { .half:hover { filter: brightness(1.08); } }
  .half.recording { animation: pulse 1.1s ease-in-out infinite; }
  .half.de.recording { background: #5a1a1a; }
  .half.it.recording { background: #ffd9c9; }
  .half.processing { opacity: 0.7; }
  @keyframes pulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }
  .label-row { display: flex; align-items: center; gap: 20px; }
  .label { font-size: clamp(40px, 7vw, 72px); font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .status { font-size: 14px; opacity: 0.6; margin-top: 6px; min-height: 20px; display: inline-flex; align-items: center; gap: 8px; }
  .result { margin-top: 28px; max-width: 720px; text-align: center; width: 100%; }
  .result .source { opacity: 0.5; font-size: 15px; margin-bottom: 10px; font-style: italic; }
  .result .translated { font-size: clamp(20px, 2.4vw, 28px); line-height: 1.35; font-weight: 500; }

  /* typing dots */
  .dots { display: none; gap: 4px; align-items: center; }
  .half.processing .dots { display: inline-flex; }
  .dots i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.35; animation: dot-bounce 1.2s ease-in-out infinite; }
  .dots i:nth-child(2) { animation-delay: 0.15s; }
  .dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40%           { opacity: 1;   transform: translateY(-4px); }
  }

  /* shimmer skeleton for the target side while waiting for translation */
  .skeleton { display: flex; flex-direction: column; gap: 12px; align-items: center; margin: 0 auto; max-width: 560px; }
  .skeleton .line { height: 22px; width: 100%; border-radius: 6px;
    background: linear-gradient(90deg, rgba(127,127,127,0.10) 0%, rgba(127,127,127,0.28) 50%, rgba(127,127,127,0.10) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton .line.short { width: 60%; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* live audio meter sits next to the language label; dim when idle, full when recording/playing */
  .meter { display: flex; align-items: flex-end; gap: 5px; height: 52px; opacity: 0.18; transition: opacity 0.2s; }
  .half.recording .meter, .half.playing .meter { opacity: 1; }
  .meter i { display: block; width: 6px; height: 8%; background: currentColor; border-radius: 3px; transition: height 60ms linear; }

  /* action buttons (replay/copy) next to source / translated text */
  .result .source { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .result .translated { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .result .translated .actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn { background: none; border: 1.5px solid currentColor; border-radius: 999px; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: inherit; opacity: 0.55; transition: opacity 0.15s, transform 0.1s; padding: 0; flex-shrink: 0; }
  @media (hover: hover) { .icon-btn:hover { opacity: 1; } }
  .icon-btn:active { transform: scale(0.92); opacity: 1; }
  .icon-btn svg { width: 22px; height: 22px; }
  .icon-btn.copied { opacity: 1; }
  .icon-btn.slow { font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 700; font-size: 11px; letter-spacing: 0; }

  /* top-right toolbar (history + key) — always on the dark half, so explicit white */
  .topbar { position: fixed; top: 10px; right: 12px; display: flex; gap: 6px; z-index: 15; }
  .topbar button { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; opacity: 0.85; cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; width: 38px; height: 38px; border-radius: 999px; transition: opacity 0.15s, background 0.15s; }
  .topbar button:hover { opacity: 1; background: rgba(255,255,255,0.22); }
  .topbar button svg { width: 20px; height: 20px; }

  /* history / key overlay */
  .overlay { position: fixed; inset: 0; background: rgba(30,28,26,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 30; padding: 16px; }
  .overlay.hidden { display: none; }
  .overlay-card { background: #2a2724; color: #f0ece6; border-radius: 14px; width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.45); }
  .overlay-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #3a3733; }
  .overlay-head h2 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 0.3px; }
  .overlay-close { background: none; border: none; color: inherit; font-size: 26px; cursor: pointer; line-height: 1; padding: 0 6px; opacity: 0.55; }
  .overlay-close:hover { opacity: 1; }
  .overlay-body { overflow-y: auto; padding: 4px 18px 14px; }
  .history-item { padding: 14px 0; border-bottom: 1px solid #3a3733; }
  .history-item:last-child { border-bottom: none; }
  .history-item .dir { font-size: 11px; opacity: 0.5; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
  .history-item .src { opacity: 0.6; font-style: italic; margin-bottom: 4px; font-size: 14px; line-height: 1.35; }
  .history-item .trans { font-size: 17px; margin-bottom: 10px; line-height: 1.35; }
  .history-item .actions { display: flex; gap: 8px; align-items: center; }
  .history-item .icon-btn { width: 34px; height: 34px; border-width: 1px; }
  .history-item .icon-btn svg { width: 16px; height: 16px; }
  .history-item .icon-btn.delete { border-color: rgba(255,255,255,0.15); opacity: 0.35; }
  .history-item .icon-btn.delete:hover { opacity: 1; color: #e07a7a; border-color: #e07a7a; }
  .history-item .cost { font-size: 11px; opacity: 0.55; font-family: ui-monospace, SFMono-Regular, monospace; cursor: help; letter-spacing: 0.2px; margin-left: auto; }
  .head-actions { display: flex; align-items: center; gap: 8px; }
  .overlay-reset { background: none; border: 1px solid #3a3733; color: inherit; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; opacity: 0.7; font-family: inherit; }
  .overlay-reset:hover:not(:disabled) { opacity: 1; background: rgba(224,122,122,0.12); border-color: #e07a7a; color: #e07a7a; }
  .overlay-reset:disabled { opacity: 0.25; cursor: not-allowed; }
  .history-footer { padding: 14px 0 4px; display: flex; gap: 18px; justify-content: center; border-top: 1px solid #3a3733; margin-top: 10px; }
  .link-btn { background: none; border: none; color: inherit; opacity: 0.5; cursor: pointer; font-size: 12px; font-family: inherit; padding: 4px 8px; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  .link-btn:hover:not(:disabled) { opacity: 1; }
  .link-btn:disabled { opacity: 0.25; cursor: not-allowed; text-decoration: none; }

  /* offline banner */
  .offline-banner { position: fixed; top: 0; left: 0; right: 0; padding: 8px 14px; background: #b86b3a; color: #fff; text-align: center; font-size: 13px; line-height: 1.35; font-weight: 500; z-index: 25; transform: translateY(-100%); transition: transform 0.25s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .offline-banner.show { transform: translateY(0); }
  /* nudge the topbar down when banner is visible so it doesn't overlap */
  .offline-banner.show ~ .topbar { top: 48px; }

  /* offline state: halves visually disabled, no hover lift, not-allowed cursor */
  body.offline .half:not(.recording) { cursor: not-allowed; }
  body.offline .half:not(.recording) .label,
  body.offline .half:not(.recording) .status,
  body.offline .half:not(.recording) .meter { opacity: 0.4; }
  body.offline .half:not(.recording):hover { filter: none; }
  .history-empty { padding: 28px 12px; text-align: center; opacity: 0.5; font-size: 14px; }
  #historyTotal { font-size: 12px; opacity: 0.55; font-weight: 400; font-family: ui-monospace, SFMono-Regular, monospace; margin-left: 6px; letter-spacing: 0.2px; }

  /* mobile / narrow screens */
  @media (max-width: 560px) {
    .half { padding: 16px; }
    .label { font-size: clamp(34px, 11vw, 56px); letter-spacing: -1.5px; }
    .label-row { gap: 14px; }
    .meter { height: 40px; gap: 4px; }
    .meter i { width: 5px; }
    .status { font-size: 13px; margin-top: 4px; }
    .result { margin-top: 18px; }
    .result .source { font-size: 14px; margin-bottom: 6px; }
    .topbar { top: 6px; right: 8px; gap: 4px; }
    .topbar button { width: 34px; height: 34px; }
    .topbar button svg { width: 18px; height: 18px; }
  }

  /* very short viewports — e.g. landscape phone */
  @media (max-height: 480px) {
    .half { padding: 10px 16px; }
    .label { font-size: clamp(28px, 7vh, 44px); }
    .meter { height: 36px; }
    .result { margin-top: 10px; }
  }
  /* form styles used inside the settings overlay */
  .overlay-info { font-size: 13px; opacity: 0.65; margin: 4px 0 14px; line-height: 1.45; }
  .overlay-body input[type="password"], .overlay-body select, .overlay-body input[type="number"] {
    width: 100%; padding: 11px 13px; background: #1e1c1a; color: #f0ece6;
    border: 1px solid #3a3733; border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; box-sizing: border-box;
  }
  .overlay-body select { font-family: inherit; -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f0ece6'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 32px; }
  .overlay-body input:focus, .overlay-body select:focus { outline: none; border-color: #4ab38a; }
  .overlay-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .overlay-actions .primary { background: #2a7; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .overlay-actions .primary:hover { background: #38a577; }
  .build-info { margin-top: 14px; padding-top: 12px; border-top: 1px solid #3a3733; font-size: 11px; opacity: 0.4; text-align: center; font-family: ui-monospace, SFMono-Regular, monospace; letter-spacing: 0.3px; }

  /* settings rows */
  .settings-row { margin-top: 14px; }
  .settings-row label { display: block; font-size: 12px; opacity: 0.6; margin-bottom: 6px; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .settings-row.inline { display: flex; align-items: center; gap: 10px; }
  .settings-row.inline label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 13px; opacity: 0.85; font-weight: 400; flex: 1; }
  .settings-row input[type="range"] { width: 100%; accent-color: #4ab38a; }
  .settings-row .row-flex { display: flex; align-items: center; gap: 12px; }
  .settings-row .row-flex input[type="range"] { flex: 1; }
  .settings-row .value { font-family: ui-monospace, monospace; font-size: 13px; opacity: 0.7; min-width: 42px; text-align: right; }
  /* iOS-style toggle */
  .toggle { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
  .toggle input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; margin: 0; cursor: pointer; z-index: 1; }
  .toggle .slider { position: absolute; inset: 0; background: #3a3733; border-radius: 999px; transition: background 0.15s; pointer-events: none; }
  .toggle .slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 18px; height: 18px; background: #f0ece6; border-radius: 50%; transition: transform 0.15s; }
  .toggle input:checked + .slider { background: #2a7; }
  .toggle input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>

<div id="keyOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>Einstellungen</h2>
      <button class="overlay-close" id="keyClose" aria-label="Schließen">×</button>
    </div>
    <div class="overlay-body">
      <div class="settings-row">
        <label for="keyInput">OpenAI API Key</label>
        <input type="password" id="keyInput" placeholder="sk-...">
        <p class="overlay-info" style="margin: 8px 0 0;">Nur lokal im Browser. Wird direkt an OpenAI gesendet.</p>
      </div>
      <div class="settings-row">
        <label for="voiceSelect">Stimme</label>
        <select id="voiceSelect"></select>
      </div>
      <div class="settings-row">
        <label>Tempo</label>
        <div class="row-flex">
          <input type="range" id="speedSlider" min="0.7" max="1.3" step="0.05">
          <span class="value" id="speedValue">1.00×</span>
        </div>
      </div>
      <div class="settings-row inline">
        <label for="vadToggle">Auto-Stopp bei Sprechpause</label>
        <span class="toggle"><input type="checkbox" id="vadToggle"><span class="slider"></span></span>
      </div>
      <div class="settings-row" id="vadMsRow">
        <label>Stillschweige-Dauer bis Auto-Stopp</label>
        <div class="row-flex">
          <input type="range" id="vadMsSlider" min="500" max="3000" step="100">
          <span class="value" id="vadMsValue">1500 ms</span>
        </div>
      </div>
      <div class="overlay-actions">
        <button id="keySave" class="primary">Speichern</button>
      </div>
      <div class="build-info" id="buildInfo"></div>
    </div>
  </div>
</div>

<div class="half de" data-lang="de" data-target="it">
  <div class="label-row">
    <div class="label">Deutsch</div>
    <div class="meter"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="status"><span class="status-text">Klick zum Sprechen</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div class="result" id="result-de"></div>
</div>

<div class="half it" data-lang="it" data-target="de">
  <div class="label-row">
    <div class="label">Italiano</div>
    <div class="meter"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="status"><span class="status-text">Clicca per parlare</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div class="result" id="result-it"></div>
</div>

<div class="offline-banner" id="offlineBanner">Offline — Übersetzungen funktionieren erst wieder mit Internetverbindung</div>

<div class="topbar">
  <button id="historyBtn" title="Verlauf" aria-label="Verlauf"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm-1 5v5l4 2 .7-1.3-3.2-1.9V8H12z"/><path d="M13 3v2c.7 0 1.4.1 2 .2L15.5 3.4A9 9 0 0 0 13 3z" opacity=".5"/></svg></button>
  <button id="gear" title="API Key" aria-label="API Key"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.58-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.5.5 0 0 0 13.93 2h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.58.22L2.74 8.48a.5.5 0 0 0 .12.61l2.03 1.58c-.04.31-.07.63-.07.94 0 .31.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.31.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.06.24.27.42.49.42h3.84c.24 0 .44-.18.49-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.49 0 .61-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
</div>

<div id="historyOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>Verlauf <span id="historyTotal"></span></h2>
      <div class="head-actions">
        <button class="overlay-reset" id="historyReset" title="Alle Einträge löschen">Alle löschen</button>
        <button class="overlay-close" id="historyClose" aria-label="Schließen">×</button>
      </div>
    </div>
    <div class="overlay-body">
      <div id="historyList"></div>
      <div class="history-footer">
        <button class="link-btn" id="historyExport">Exportieren (JSON)</button>
        <button class="link-btn" id="historyImport">Importieren</button>
        <input type="file" id="historyImportFile" accept="application/json,.json" hidden>
      </div>
    </div>
  </div>
</div>

<script>
const SVG = {
  speaker: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.91 7-4.49 7-8.77s-3-7.86-7-8.77z"/></svg>',
  mic: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.58-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.5.5 0 0 0 13.93 2h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.58.22L2.74 8.48a.5.5 0 0 0 .12.61l2.03 1.58c-.04.31-.07.63-.07.94 0 .31.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.31.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.06.24.27.42.49.42h3.84c.24 0 .44-.18.49-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.49 0 .61-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>'
};

const LANG_NAMES = { de: 'German', it: 'Italian' };

// Rough USD pricing — sanity-check against OpenAI's pricing page if numbers look off.
const PRICING = {
  sttPerSec:        0.003 / 60,    // gpt-4o-mini-transcribe ~$0.003/min
  gptInputPerToken: 0.150 / 1e6,   // gpt-4o-mini $0.150 / 1M input tokens
  gptOutputPerToken:0.600 / 1e6,   // gpt-4o-mini $0.600 / 1M output tokens
  ttsPerChar:       0.600 / 1e6,   // gpt-4o-mini-tts text input ~$0.60 / 1M

};

function calcCost(parts) {
  const stt = (parts.audioSec || 0) * PRICING.sttPerSec;
  const gptIn  = (parts.promptTokens || 0) * PRICING.gptInputPerToken;
  const gptOut = (parts.completionTokens || 0) * PRICING.gptOutputPerToken;
  const tts = (parts.ttsChars || 0) * PRICING.ttsPerChar;
  return { stt, gpt: gptIn + gptOut, tts, total: stt + gptIn + gptOut + tts };
}

function fmt$(n) {

// Online/offline indicator — OpenAI calls die without internet.
// Chrome DevTools "Offline" doesn't always fire the offline event again
// after a SW-served reload, and navigator.onLine starts at the physical
// connection's state (usually true). So we actively probe on load.
const offlineBanner = document.getElementById('offlineBanner');
let isOffline = !navigator.onLine;
function setOffline(o) {
  if (isOffline === o) return;
  isOffline = o;
  offlineBanner.classList.toggle('show', o);
  document.body.classList.toggle('offline', o);
}
function probeOnline() {
  return (async () => {
    try {
      const c = new AbortController();
      const t = setTimeout(() => c.abort(), 2000);
      // no-cors HEAD against api.openai.com: opaque success means the network
      // reaches OpenAI; any network-level block (DevTools Offline, real outage)
      // throws.
      await fetch('https://api.openai.com/', {
        method: 'HEAD', mode: 'no-cors', cache: 'no-store', signal: c.signal
      });
      clearTimeout(t);
      setOffline(false);
      return true;
    } catch {
      setOffline(true);
      return false;
    }
  })();
}
window.addEventListener('online',  probeOnline);
window.addEventListener('offline', () => setOffline(true));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') probeOnline();
});
setOffline(isOffline);

// Wraps fetch so any network-level failure (TypeError) flips the app to
// offline immediately, even if navigator.onLine still lies.
async function safeFetch(input, init) {
  try {
    const res = await fetch(input, init);
    if (isOffline) setOffline(false);
    return res;
  } catch (err) {
    if (err instanceof TypeError) setOffline(true);
    throw err;
  }
}

async function ensureMicStream() {
  if (micStream && micStream.active && micStream.getAudioTracks().some(t => t.readyState === 'live')) {
    return micStream;
  }
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return micStream;
}

function startMeter(stream, lang) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (meterStream !== stream) {
    if (meterSource) { try { meterSource.disconnect(); } catch (e) {} }
    meterSource = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    analyser.smoothingTimeConstant = 0.6;
    meterSource.connect(analyser);
    meterStream = stream;
  }
  const data = new Uint8Array(analyser.frequencyBinCount);
  const bars = document.querySelectorAll(`.half[data-lang="${lang}"] .meter i`);
  const N = bars.length;
  const binSize = Math.max(1, Math.floor(data.length / N));
  // VAD state — must have spoken first (overall amplitude above threshold), then
  // sustained silence longer than settings.vadSilenceMs triggers stopRecording.
  const VAD_THRESHOLD = 18;          // 0–255 avg
  let vadSpoke = false;
  let vadLastVoiceAt = performance.now();
  function tick() {
    analyser.getByteFrequencyData(data);
    let overall = 0;
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let j = 0; j < binSize; j++) sum += data[i * binSize + j] || 0;
      const avg = sum / binSize;
      bars[i].style.height = Math.min(100, 8 + (avg / 255) * 130) + '%';
      overall += avg;
    }
    overall /= N;
    const now = performance.now();
    if (overall > VAD_THRESHOLD) {
      vadSpoke = true;
      vadLastVoiceAt = now;
    } else if (settings.vadEnabled && vadSpoke && (now - vadLastVoiceAt) > settings.vadSilenceMs) {
      stopRecording();
      return; // don't schedule another frame
    }
    meterRaf = requestAnimationFrame(tick);
  }
  tick();
}

function stopMeter(lang) {
  if (meterRaf) cancelAnimationFrame(meterRaf);
  meterRaf = null;
  const sel = lang ? `.half[data-lang="${lang}"] .meter i` : '.meter i';
  document.querySelectorAll(sel).forEach(b => b.style.height = '8%');
}

async function playAudioWithMeter(blob, lang, playbackRate = 1) {
  stopPlayback();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const an = audioCtx.createAnalyser();
  an.fftSize = 64;
  an.smoothingTimeConstant = 0.6;

  let source, audio, blobUrl, sourceType, start;
  if (playbackRate === 1) {
    // BufferSource: fully decoded → exact start, no clipped first samples
    let buf;
    try {
      const ab = await blob.arrayBuffer();
      buf = await audioCtx.decodeAudioData(ab);
    } catch (err) { console.error('Decode failed:', err); return; }
    source = audioCtx.createBufferSource();
    source.buffer = buf;
    source.connect(an);
    sourceType = 'buf';
    start = () => source.start(0);
  } else {
    // HTMLAudioElement: preservesPitch keeps the voice while slowing down.
    // AudioBufferSourceNode.playbackRate would pitch-shift, which sounds
    // like a different speaker.
    blobUrl = URL.createObjectURL(blob);
    audio = new Audio(blobUrl);
    audio.preload = 'auto';
    try {
      await new Promise((resolve, reject) => {
        if (audio.readyState >= 3) return resolve();
        audio.addEventListener('canplaythrough', resolve, { once: true });
        audio.addEventListener('error', reject, { once: true });
      });
    } catch (err) { console.error('Load failed:', err); URL.revokeObjectURL(blobUrl); return; }
    // Set rate + pitch flags AFTER load — load() / src change resets playbackRate.
    audio.preservesPitch = true;
    audio.mozPreservesPitch = true;
    audio.webkitPreservesPitch = true;
    audio.playbackRate = playbackRate;
    source = audioCtx.createMediaElementSource(audio);
    source.connect(an);
    sourceType = 'media';
    start = () => audio.play().catch(() => {});
  }
  an.connect(audioCtx.destination);

  const half = document.querySelector(`.half[data-lang="${lang}"]`);
  half.classList.add('playing');
  const bars = half.querySelectorAll('.meter i');
  const N = bars.length;
  const data = new Uint8Array(an.frequencyBinCount);
  const binSize = Math.max(1, Math.floor(data.length / N));
  let raf;
  function tick() {
    an.getByteFrequencyData(data);
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let j = 0; j < binSize; j++) sum += data[i * binSize + j] || 0;
      const avg = sum / binSize;
      bars[i].style.height = Math.min(100, 8 + (avg / 255) * 130) + '%';
    }
    raf = requestAnimationFrame(tick);
  }

  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    if (raf) cancelAnimationFrame(raf);
    half.classList.remove('playing');
    bars.forEach(b => b.style.height = '8%');
    try { source.disconnect(); an.disconnect(); } catch (e) {}
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    if (activePlayback && activePlayback.cleanup === cleanup) activePlayback = null;
  };
  if (sourceType === 'buf') source.onended = cleanup;
  else { audio.onended = cleanup; audio.onerror = cleanup; }

  activePlayback = { sourceType, source, audio, cleanup };
  start();
  tick();
}

function stopPlayback() {
  if (activePlayback) {
    try {
      if (activePlayback.sourceType === 'buf') activePlayback.source.stop();
      else if (activePlayback.audio) activePlayback.audio.pause();
    } catch (e) {}
    activePlayback.cleanup && activePlayback.cleanup();
    activePlayback = null;
  }
}

async function startRecording(lang, target) {
  if (isOffline) return;
  // Wait for the initial connectivity probe so a too-fast click on a
  // SW-served reload doesn't start a recording into the void.
  if (initialOnlineCheck) {
    await initialOnlineCheck;
    initialOnlineCheck = null;
    if (isOffline) return;
  }
  if (!apiKey) { openKey(); return; }
  try {
    stopPlayback();
    clearResult(lang);
    clearResult(target);
    const stream = await ensureMicStream();
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recordingLang = lang;
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const audioSec = (performance.now() - recordingStartedAt) / 1000;
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      processAudio(blob, lang, target, audioSec);
    };
    mediaRecorder.start();
    recordingStartedAt = performance.now();
    setStatus(lang, 'recording');
    document.querySelector(`.half[data-lang="${lang}"]`).classList.add('recording');
    startMeter(stream, lang);
  } catch (err) {
    micStream = null;
    alert('Mikrofon-Zugriff verweigert: ' + err.message);
    setStatus(lang, 'idle');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    const lang = recordingLang;
    const half = document.querySelector(`.half[data-lang="${lang}"]`);
    const target = half.dataset.target;
    mediaRecorder.stop();
    stopMeter(lang);
    half.classList.remove('recording');
    half.classList.add('processing');
    setStatus(lang, 'transcribing');
    showSkeleton(target);
  }
}

function setStatus(lang, key) {
  document.querySelector(`.half[data-lang="${lang}"] .status-text`).textContent = STATUS[lang][key];
}

function showSkeleton(lang) {
  document.getElementById('result-' + lang).innerHTML =
    '<div class="skeleton"><div class="line"></div><div class="line short"></div></div>';
}

function clearResult(lang) {
  document.getElementById('result-' + lang).innerHTML = '';
}

async function processAudio(blob, sourceLang, targetLang, audioSec) {
  busy = true;
  lastSourceBlob = blob;
  try {
    // 1. STT
    const fd = new FormData();
    const ext = (blob.type.includes('mp4') || blob.type.includes('mp4a')) ? 'mp4' : 'webm';
    fd.append('file', blob, 'audio.' + ext);
    fd.append('model', 'gpt-4o-mini-transcribe');
    fd.append('language', sourceLang);
    const tRes = await safeFetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey },
      body: fd
    });
    if (!tRes.ok) throw new Error('STT: ' + await tRes.text());
    const { text: sourceText } = await tRes.json();
    if (!sourceText || !sourceText.trim()) throw new Error('Keine Sprache erkannt');

    // Progressive reveal: show transcribed source immediately, flip status to "translating"
    document.getElementById('result-' + sourceLang).innerHTML =
      `<div class="source"><span>${esc(sourceText)}</span>${replayBtn('source')}</div>`;
    setStatus(sourceLang, 'translating');

    // 2. GPT translation
    const trRes = await safeFetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        temperature: 0.2,
        messages: [
          { role: 'system', content: `You translate from ${LANG_NAMES[sourceLang]} to ${LANG_NAMES[targetLang]}. Output ONLY the translation. No quotes, no explanation, no source text.` },
          { role: 'user', content: sourceText }
        ]
      })
    });
    if (!trRes.ok) throw new Error('GPT: ' + await trRes.text());
    const trJson = await trRes.json();
    const translatedText = trJson.choices[0].message.content.trim().replace(/^["']|["']$/g, '');
    const usage = trJson.usage || {};
    const cost = calcCost({
      audioSec,
      promptTokens: usage.prompt_tokens || 0,
      completionTokens: usage.completion_tokens || 0,
      ttsChars: translatedText.length
    });

    document.getElementById('result-' + targetLang).innerHTML =
      `<div class="translated"><span>${esc(translatedText)}</span><div class="actions">${replayBtn('tts')}${slowBtn('tts')}${copyBtn()}</div></div>`;
    setStatus(sourceLang, 'idle');
    document.querySelector(`.half[data-lang="${sourceLang}"]`).classList.remove('processing');
    busy = false;

    // 3. TTS — fire-and-forget so user can already start the next recording
    const ttsPromise = speak(translatedText, targetLang);
    // 4. Once TTS arrives, save into history
    ttsPromise.then(ttsBlob => {
      if (ttsBlob) recordHistory({
        sourceLang, targetLang, sourceText, translatedText,
        sourceBlob: blob, ttsBlob, cost
      });
    });
  } catch (err) {
    console.error(err);
    const isNetwork = (err instanceof TypeError) || /failed to fetch|networkerror/i.test(err.message || '');
    alert(isNetwork
      ? 'Offline — die Übersetzung konnte nicht abgeschlossen werden. Verbindung prüfen.'
      : 'Fehler: ' + err.message);
    setStatus(sourceLang, 'idle');
    document.querySelector(`.half[data-lang="${sourceLang}"]`).classList.remove('processing');
    clearResult(targetLang);
    busy = false;
  }
}

async function speak(text, lang) {
  try {
    const ttsRes = await safeFetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini-tts',
        voice: settings.voice,
        input: text,
        response_format: 'mp3',
        speed: settings.ttsSpeed,
        instructions: `Speak the given text in ${LANG_NAMES[lang]} with natural, native pronunciation. The text is in ${LANG_NAMES[lang]} — do not switch language.`
      })
    });
    if (!ttsRes.ok) throw new Error('TTS: ' + await ttsRes.text());
    const audioBlob = await ttsRes.blob();
    lastTtsBlob = audioBlob;
    playAudioWithMeter(audioBlob, lang);
    return audioBlob;
  } catch (err) {
    console.error(err);
    return null;
  }
}

async function copyToClipboard(btn, text) {
  try {
    await navigator.clipboard.writeText(text);

    // Fallback for non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
  const original = btn.innerHTML;
  btn.innerHTML = SVG.check;
  btn.classList.add('copied');
  setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1100);
}

// --- IndexedDB persistence (blobs survive reload) ---
const DB_NAME = 'simpletranslate';
const DB_STORE = 'history';
let dbPromise = null;
function getDB() {
  if (!dbPromise) {
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  return dbPromise;
}
async function dbLoadHistory() {
  try {
    const db = await getDB();
    return await new Promise(resolve => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).getAll();
      req.onsuccess = () => {
        const all = (req.result || []).sort((a, b) => a.id - b.id);
        resolve(all);
      };
      req.onerror = () => resolve([]);
    });
  } catch (e) { console.error('IDB load failed', e); return []; }
}
async function dbSaveHistory(entry) {
  try {
    const db = await getDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      const req = tx.objectStore(DB_STORE).add({
        sourceLang: entry.sourceLang, targetLang: entry.targetLang,
        sourceText: entry.sourceText, translatedText: entry.translatedText,
        sourceBlob: entry.sourceBlob, ttsBlob: entry.ttsBlob,
        cost: entry.cost, timestamp: Date.now()
      });
      req.onsuccess = () => { entry.id = req.result; resolve(req.result); };
      req.onerror = () => reject(req.error);
    });
  } catch (e) { console.error('IDB save failed', e); }
}
async function dbDeleteEntry(id) {
  try {
    const db = await getDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
  } catch (e) { console.error('IDB delete failed', e); }
}
async function dbClearAll() {
  try {
    const db = await getDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).clear();
  } catch (e) { console.error('IDB clear failed', e); }
}
async function deleteHistoryEntry(idx) {
  const h = history[idx];
  if (!h) return;
  if (h.id != null) await dbDeleteEntry(h.id);
  history.splice(idx, 1);
  renderHistory();
}
async function clearHistoryAll() {
  if (!history.length) return;
  if (!confirm(`Alle ${history.length} Einträge wirklich löschen?`)) return;
  await dbClearAll();
  history.length = 0;
  renderHistory();
}
// Restore previous session's history on load
dbLoadHistory().then(entries => { history.push(...entries); });
document.getElementById('historyReset').onclick = clearHistoryAll;

// --- Export / Import ---
function blobToBase64(blob) {
  return new Promise(resolve => {
    if (!blob) return resolve(null);
    const r = new FileReader();
    r.onload = () => resolve({ type: blob.type, data: r.result.split(',')[1] });
    r.onerror = () => resolve(null);
    r.readAsDataURL(blob);
  });
}
function base64ToBlob(o) {
  if (!o || !o.data) return null;
  try {
    const binary = atob(o.data);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new Blob([bytes], { type: o.type || 'application/octet-stream' });
  } catch (e) { return null; }
}

async function exportHistory() {
  if (!history.length) return;
  const entries = await Promise.all(history.map(async h => ({
    sourceLang: h.sourceLang, targetLang: h.targetLang,
    sourceText: h.sourceText, translatedText: h.translatedText,
    sourceBlob: await blobToBase64(h.sourceBlob),
    ttsBlob: await blobToBase64(h.ttsBlob),
    cost: h.cost, timestamp: h.timestamp || null
  })));
  const payload = { app: 'simpletranslate', version: 1, exportedAt: Date.now(), entries };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `simpletranslate-history-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

async function importHistory(file) {
  let parsed;
  try { parsed = JSON.parse(await file.text()); }
  catch { alert('Konnte JSON nicht parsen.'); return; }
  if (!parsed || !Array.isArray(parsed.entries)) { alert('Datei enthält keine Verlaufseinträge.'); return; }
  if (!confirm(`${parsed.entries.length} Einträge importieren? (werden an den bestehenden Verlauf angehängt)`)) return;
  for (const e of parsed.entries) {
    const entry = {
      sourceLang: e.sourceLang, targetLang: e.targetLang,
      sourceText: e.sourceText || '', translatedText: e.translatedText || '',
      sourceBlob: base64ToBlob(e.sourceBlob),
      ttsBlob: base64ToBlob(e.ttsBlob),
      cost: e.cost || null
    };
    history.push(entry);
    await dbSaveHistory(entry);
  }
  renderHistory();
}

document.getElementById('historyExport').onclick = exportHistory;
document.getElementById('historyImport').onclick = () => document.getElementById('historyImportFile').click();
document.getElementById('historyImportFile').onchange = e => {
  const f = e.target.files[0];
  if (f) importHistory(f);
  e.target.value = '';
};

const historyOverlay = document.getElementById('historyOverlay');
function openHistory() { renderHistory(); historyOverlay.classList.remove('hidden'); }
function closeHistory() { historyOverlay.classList.add('hidden'); }
document.getElementById('historyBtn').onclick = openHistory;
document.getElementById('historyClose').onclick = closeHistory;
historyOverlay.addEventListener('click', e => { if (e.target === historyOverlay) closeHistory(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!historyOverlay.classList.contains('hidden')) closeHistory();
  if (!keyOverlay.classList.contains('hidden')) closeKey();
});

function renderHistory() {
  const list = document.getElementById('historyList');
  const totalEl = document.getElementById('historyTotal');
  const resetBtn = document.getElementById('historyReset');
  const exportBtn = document.getElementById('historyExport');
  resetBtn.disabled = history.length === 0;
  exportBtn.disabled = history.length === 0;
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">Noch nichts übersetzt.</div>';
    totalEl.textContent = '';
    return;
  }
  const total = history.reduce((s, h) => s + (h.cost?.total || 0), 0);
  totalEl.textContent = '≈ ' + fmt$(total);
  // newest first
  list.innerHTML = history.slice().reverse().map((h, i) => {
    const idx = history.length - 1 - i;
    const c = h.cost;
    const costTitle = c
      ? `STT ${fmt$(c.stt)} · GPT ${fmt$(c.gpt)} · TTS ${fmt$(c.tts)}`
      : '';
    const costHtml = c
      ? `<span class="cost" title="${costTitle}">≈ ${fmt$(c.total)}</span>`
      : '';
    return `<div class="history-item" data-idx="${idx}">
      <div class="dir">${h.sourceLang.toUpperCase()} → ${h.targetLang.toUpperCase()}</div>
      <div class="src">${esc(h.sourceText)}</div>
      <div class="trans">${esc(h.translatedText)}</div>
      <div class="actions">
        <button class="icon-btn" data-h-action="src" data-h-idx="${idx}" title="Aufnahme anhören">${SVG.mic}</button>
        <button class="icon-btn" data-h-action="tts" data-h-idx="${idx}" title="Übersetzung anhören">${SVG.speaker}</button>
        <button class="icon-btn slow" data-h-action="slow" data-h-idx="${idx}" title="Übersetzung langsam (0.7×)">0.7×</button>
        <button class="icon-btn copy" data-h-action="copy" data-h-idx="${idx}" title="Übersetzung kopieren">${SVG.copy}</button>
        ${costHtml}
        <button class="icon-btn delete" data-h-action="delete" data-h-idx="${idx}" title="Eintrag löschen">${SVG.trash}</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
